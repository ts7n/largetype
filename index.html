<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Big Type</title>
<link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Ccircle cx='32' cy='32' r='32' fill='%23000'/%3E%3Ctext x='50%25' y='50%25' text-anchor='middle' dominant-baseline='central' font-family='-apple-system,BlinkMacSystemFont,Helvetica,Arial,sans-serif' font-weight='700' font-size='30' fill='%23fff'%3EBT%3C/text%3E%3C/svg%3E">
<style>
  html, body {
    margin: 0;
    height: 100%;
    background: #fff;
    color: #000;
    font-family: -apple-system, BlinkMacSystemFont, "Helvetica Neue", Helvetica, Arial, sans-serif;
  }
  body {
    display: flex;
    flex-direction: column;
    min-height: 100vh;
  }
  #stage {
    flex: 1;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 4vmin;
    box-sizing: border-box;
    overflow: hidden;
  }
  #text {
    position: relative;
    display: inline-block;
    max-width: 100%;
    text-align: center;
    line-height: 1.05;
    font-weight: 600;
    letter-spacing: -0.02em;
    word-break: break-word;
    overflow-wrap: break-word;
    outline: none;
    white-space: pre-wrap;
  }
  @media (prefers-color-scheme: dark) {
    html, body { background: #000; color: #fff; }
  }
</style>
</head>
<body>
  <main id="stage">
    <div id="text" contenteditable="true" autofocus spellcheck="false"></div>
  </main>
<script>
(function () {
  const stage = document.getElementById('stage');
  const text = document.getElementById('text');

  const MIN = 16;
  const MAX = 400;

  function fit() {
    const content = text.textContent;
    if (!content) {
      text.style.fontSize = '20vmin';
      return;
    }

    const stageRect = stage.getBoundingClientRect();
    const availW = stageRect.width - 1;
    const availH = stageRect.height - 1;

    let lo = MIN, hi = MAX, best = MIN;
    for (let i = 0; i < 18; i++) {
      const mid = (lo + hi) / 2;
      text.style.fontSize = mid + 'px';
      if (text.scrollWidth <= availW && text.scrollHeight <= availH) {
        best = mid;
        lo = mid;
      } else {
        hi = mid;
      }
      if (hi - lo < 0.5) break;
    }
    text.style.fontSize = best + 'px';
  }

  const raf = () => requestAnimationFrame(fit);
  text.addEventListener('input', raf);
  window.addEventListener('resize', raf);
  document.addEventListener('mousedown', (e) => {
    if (e.target !== text) {
      e.preventDefault();
      text.focus();
      const sel = window.getSelection();
      const range = document.createRange();
      range.selectNodeContents(text);
      range.collapse(false);
      sel.removeAllRanges();
      sel.addRange(range);
    }
  });

  const params = new URLSearchParams(location.search);
  const initial = params.get('t') || location.hash.slice(1);
  if (initial) text.textContent = decodeURIComponent(initial);

  raf();
  text.focus();
})();
</script>
</body>
</html>
